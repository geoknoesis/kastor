# Optional JMH run for the native SHACL benchmark module (manual / scheduled).
# Does not gate merges; use for collecting timing artifacts. See docs/kastor/design/shacl-native-engine-benchmark.md

name: SHACL JMH benchmarks

on:
  workflow_dispatch: {}
  schedule:
    # Weekly Sunday 06:00 UTC
    - cron: "0 6 * * 0"

jobs:
  jmh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run JMH
        run: ./gradlew :benchmarks:shacl:jmh --no-daemon
        shell: bash

      - name: Upload JMH results
        uses: actions/upload-artifact@v7
        with:
          name: shacl-jmh-results
          path: build/modules/benchmarks/shacl/results/jmh/
