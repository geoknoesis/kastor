name: Conformance

# Full upstream RDF 1.2 + SHACL conformance matrices (scheduled / manual dispatch).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: RDF conformance tests
        run: ./gradlew :rdf:conformance:test --no-daemon
        shell: bash

      - name: SHACL 1.2 W3C tests (native)
        run: |
          set -euo pipefail
          mkdir -p rdf/shacl/validation/test-data
          rm -rf rdf/shacl/validation/test-data/w3c-shacl12
          git clone --depth 1 --branch gh-pages https://github.com/w3c/data-shapes.git /tmp/data-shapes-shacl
          mv /tmp/data-shapes-shacl/shacl12-test-suite rdf/shacl/validation/test-data/w3c-shacl12
          ./gradlew :rdf:shacl-validation:test --no-daemon
        shell: bash
