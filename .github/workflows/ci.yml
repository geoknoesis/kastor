name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Gradle test
        # Conformance (:rdf:conformance) is run separately for releases; see CONTRIBUTING.md
        run: ./gradlew test --no-daemon -x :rdf:conformance:test
        shell: bash

      - name: Compile SHACL benchmark modules
        # JMH + ERA CLI are not pulled in by `test`; compile explicitly so they do not rot.
        run: ./gradlew :benchmarks:shacl:jmhCompileGeneratedClasses :benchmarks:shacl-era-cli:classes --no-daemon
        shell: bash
