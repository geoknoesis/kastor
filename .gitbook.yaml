root: ./docs

structure:
  readme: README.md
  summary: SUMMARY.md

variables:
  # Project metadata
  project_name: Kastor
  project_description: A comprehensive Kotlin library for working with RDF data and domain object mapping
  version: 0.2.0
  author: GeoKnoesis LLC
  main_developer: Stephane Fellah
  contact_email: stephanef@geoknoesis.com
  company_url: https://geoknoesis.com/
  license: Apache License 2.0
  
  # Repository information
  github_url: https://github.com/geoknoesis/kastor
  issues_url: https://github.com/geoknoesis/kastor/issues
  discussions_url: https://github.com/geoknoesis/kastor/discussions
  
  # Support links
  github_sponsors: https://github.com/sponsors/geoknoesis
  ko_fi: https://ko-fi.com/geoknoesis
  
  # Documentation links (paths relative to GitBook `root`)
  kastor_docs: ./kastor/README.md
  
  # Quick start examples
  quick_start_kastor: |
    ```kotlin
    // Create a repository
    val repo = Rdf.memory()
    
    // Add RDF data
    repo.add {
        val person = iri("http://example.org/person")
        person - RDF.type - FOAF.Person
        person - FOAF.name - "John Doe"
        person - FOAF.age - 30
    }
    
    // Query the data
    val results = repo.query {
        select("?name", "?age") where {
            "?person" - RDF.type - FOAF.Person
            "?person" - FOAF.name - "?name"
            "?person" - FOAF.age - "?age"
        }
    }
    ```

plugins:
  - search
  - code
  - copy-code-button
  - expandable-chapters
  - back-to-top-button
  - github
  - edit-link
  - theme-default
  - prism
  - splitter

pluginsConfig:
  github:
    url: https://github.com/geoknoesis/kastor
  edit-link:
    base: https://github.com/geoknoesis/kastor/edit/main/docs
    label: Edit This Page
  theme-default:
    showLevel: true
    styles:
      website: styles/website.css

pdf:
  margin:
    right: 62
    left: 62
    top: 56
    bottom: 56
  headerTemplate: |
    <div style="font-size: 9px; margin-left: 1cm;">
        <span class="title">{{title}}</span>
    </div>
  footerTemplate: |
    <div style="font-size: 9px; margin: 0 auto;">
        <span class="pageNumber"></span>
    </div>
  pageNumbers: true
