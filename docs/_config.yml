title: Kastor
description: Domain-first Kotlin for RDF — RDF 1.2 & SHACL 1.2 on the standards track, Kastor Gen codegen, ontology-quality tooling, and pluggable engines (Jena, RDF4J, SPARQL, Memory).
theme: jekyll-theme-minimal
markdown: kramdown

# All Markdown pages use our layout (sidebar, Mermaid, styles). Pages can set
# layout: null to opt out.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Internal maintainer notes (not for public doc site)
exclude:
  - internal
  - Gemfile
  - Gemfile.lock
  - SUMMARY.md

# baseurl and url for https://<owner>.github.io/<repo>/ are appended in CI
# (.github/workflows/pages.yml). For local preview, run from this directory:
#   bundle install && bundle exec jekyll serve --livereload
