<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  /**
   * Call initialize synchronously right after the bundle loads. If this runs
   * only on DOMContentLoaded, Mermaid may already have registered auto-run
   * with the default startOnLoad: true and diagrams never render reliably.
   */
  if (typeof mermaid !== "undefined" && mermaid.initialize) {
    mermaid.initialize({
      startOnLoad: false,
      theme: "default",
      securityLevel: "loose",
      flowchart: { htmlLabels: true },
    });
  }

  /**
   * Kramdown + Rouge: ```mermaid → code.language-mermaid inside
   * div.highlighter-rouge. Turn those into div.mermaid; keep
   * pre.mermaid as emitted by the site (supported by Mermaid).
   */
  function promoteRougeMermaidBlocks() {
    document.querySelectorAll("code.language-mermaid").forEach(function (code) {
      var graph = code.textContent.trim();
      if (!graph) return;
      var host = document.createElement("div");
      host.className = "mermaid";
      host.textContent = graph;
      var rouge = code.closest("div.highlighter-rouge");
      if (rouge) {
        rouge.replaceWith(host);
        return;
      }
      var pre = code.parentElement;
      if (pre && pre.tagName === "PRE") {
        pre.replaceWith(host);
      }
    });
  }

  async function runMermaid() {
    if (typeof mermaid === "undefined" || typeof mermaid.run !== "function") return;
    promoteRougeMermaidBlocks();
    try {
      await mermaid.run({ querySelector: ".mermaid" });
    } catch (e) {
      console.error("Mermaid:", e);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", runMermaid);
  } else {
    runMermaid();
  }
</script>
