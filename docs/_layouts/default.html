<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d9488">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/kastor-logo-icon.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="page">
      <aside class="page-sidebar">
        {% include sidebar.html %}
      </aside>
      <main class="page-content">
        <article class="page-content-inner">
          {{ content }}
        </article>
      </main>
    </div>
    {% include mermaid-init.html %}
  </body>
</html>
